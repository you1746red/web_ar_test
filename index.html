<!DOCTYPE html>
<html>
  <head>
    <title>本格WebARテスト</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://libs.zappar.com/zappar-aframe/2.0.0/zappar-aframe.js"></script>
  </head>
  <body>
    <a-scene>
      <a-camera zappar-camera></a-camera>

      <a-entity zappar-image="target: https://cdn.zappar.com/zappar-cv/example-targets/example-tracking-image.zpt">
        <a-box 
          position="0 0.5 0" 
          material="color: blue;"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
        </a-box>
      </a-entity>
    </a-scene>
  </body>
</html>
